<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MEMS Trikaripur - Portal</title>
    <style>
        body { font-family: sans-serif; background-color: #f4f7f6; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .container { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); text-align: center; width: 90%; max-width: 400px; border-top: 5px solid #1a73e8; }
        h2 { color: #2c3e50; margin-bottom: 20px; font-size: 18px; line-height: 1.4; }
        select, input { width: 100%; padding: 12px; margin: 8px 0; border: 2px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 15px; }
        button { width: 100%; padding: 12px; background-color: #1a73e8; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; margin-top: 15px; }
    </style>
</head>
<body>
<div class="container">
    <h2>MEMS TRIKARIPUR<br>EXAM RESULT PORTAL</h2>
    <input type="text" id="rollInput" placeholder="Admission Number">
    <select id="classInput">
        <option value="">Select Class</option>
        <option value="1">Class 1</option>
        <option value="2">Class 2</option>
        <option value="3">Class 3</option>
        <option value="4">Class 4</option>
        <option value="5">Class 5</option>
        <option value="6">Class 6</option>
        <option value="7">Class 7</option>
        <option value="8">Class 8</option>
        <option value="9">Class 9</option>
        <option value="10">Class 10</option>
    </select>
    <select id="divInput">
        <option value="">Select Division</option>
        <option value="A">A</option>
        <option value="B">B</option>
        <option value="C">C</option>
        <option value="D">D</option>
        <option value="E">E</option>
        <option value="F">F</option>
        <option value="G">G</option>
        <option value="H">H</option>
        <option value="I">I</option>
    </select>
    <button onclick="check()">VIEW RESULT</button>
</div>
<script>
    function check() {
        const roll = document.getElementById('rollInput').value.trim();
        const cls = document.getElementById('classInput').value;
        const div = document.getElementById('divInput').value;
        if (roll && cls && div) { 
            window.location.href = `result.html?rollNo=${roll}&class=${cls}&div=${div}`; 
        } else {
            alert("Please fill all the fields correctly!");
        }
    }
</script>
</body>
</html>
