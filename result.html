<script>
    const sheetID = '1VHdwmJ8HI1RU2KcCEZqpLaVt9Ainirp-FPfa8z9gm6s';
    const url = `https://docs.google.com/spreadsheets/d/${sheetID}/export?format=csv`;
    const params = new URLSearchParams(window.location.search);
    const roll = params.get('rollNo');
    const uClass = params.get('class');
    const uDiv = params.get('div');

    fetch(url).then(r => r.text()).then(data => {
        const rows = data.split(/\r?\n/).map(r => r.split(','));
        const headers = rows[0];
        
        // ഇവിടെ മാറ്റം വരുത്തി: headers[10] എന്നതിന് പകരം പരീക്ഷയുടെ പേര് നൽകുക
        document.getElementById('examTitleDisplay').innerText = headers[10] || "ANNUAL EXAMINATION-2025-26";

        const s = rows.slice(1).find(r => {
            const sRoll = r[0] ? r[0].trim() : "";
            const sClassInfo = r[2] ? r[2].trim().toUpperCase() : "";
            const selected = `${uClass}-${uDiv}`.toUpperCase();
            return sRoll === roll && sClassInfo === selected;
        });

        if (s) {
            let h = `<div class="info-box"><div class="header"><strong>Name:</strong> ${s[1]}<br><strong>Class:</strong> ${s[2]}</div><table>`;
            let total = "0"; // ടോട്ടൽ കാണിക്കാൻ
            
            for (let i = 3; i < headers.length; i++) {
                const head = headers[i] ? headers[i].trim().toUpperCase() : "";
                const val = s[i] ? s[i].trim() : "";
                
                // TOTAL എന്നോ ആകെ എന്നോ ഉള്ള കോളം കണ്ടെത്തി അത് മാത്രം ടോട്ടൽ ആയി സെറ്റ് ചെയ്യുന്നു
                if (head === "TOTAL" || head === "ആകെ") { 
                    total = val; 
                    h += `<tr><td><strong>TOTAL</strong></td><td class="val"><strong>${val}</strong></td></tr>`;
                } 
                else if (head && i < 10 && val !== "" && val !== "-") { 
                    h += `<tr><td>${headers[i]}</td><td class="val">${val}</td></tr>`;
                }
            }
            h += `</table><div class="total"><span>Result</span><span>PASS</span></div></div>`;
            document.getElementById('res').innerHTML = h;
        } else {
            document.getElementById('res').innerHTML = "<p style='color:red;'>Result not found. Please check your Admission Number, Class, and Division.</p>";
        }
    });
</script>
