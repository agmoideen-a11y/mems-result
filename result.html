<script>
    const sheetID = '1VHdwmJ8HI1RU2KcCEZqpLaVt9Ainirp-FPfa8z9gm6s';
    const url = `https://docs.google.com/spreadsheets/d/${sheetID}/export?format=csv`;
    const params = new URLSearchParams(window.location.search);
    const roll = params.get('rollNo');
    const uClass = params.get('class');
    const uDiv = params.get('div');

    fetch(url).then(r => r.text()).then(data => {
        const rows = data.split(/\r?\n/).map(r => r.split(','));
        const headers = rows[0];
        
        // പരീക്ഷയുടെ പേര്
        document.getElementById('examTitleDisplay').innerText = "ANNUAL EXAMINATION 2025-26";

        const s = rows.slice(1).find(r => {
            const sRoll = r[0] ? r[0].trim() : "";
            const sClassInfo = r[2] ? r[2].trim().toUpperCase() : "";
            const selected = `${uClass}-${uDiv}`.toUpperCase();
            return sRoll === roll && sClassInfo === selected;
        });

        if (s) {
            let h = `<div class="info-box"><div class="header"><strong>Name:</strong> ${s[1]}<br><strong>Class:</strong> ${s[2]}</div><table>`;
            let totalVal = "";

            for (let i = 3; i < headers.length; i++) {
                const head = headers[i] ? headers[i].trim() : "";
                const val = s[i] ? s[i].trim() : "";
                
                if (head && val !== "" && val !== "-") {
                    // Total എന്ന കോളം വന്നാൽ അത് താഴെ കാണിക്കാൻ മാറ്റിവെക്കുന്നു
                    if (head.toUpperCase() === "TOTAL" || head === "ആകെ") {
                        totalVal = val;
                    } else {
                        h += `<tr><td>${head}</td><td class="val">${val}</td></tr>`;
                    }
                }
            }
            
            h += `</table>`;
            if (totalVal !== "") {
                h += `<div class="total"><span>TOTAL</span><span>${totalVal}</span></div>`;
            }
            h += `</div>`;
            document.getElementById('res').innerHTML = h;
        } else {
            document.getElementById('res').innerHTML = "<p style='color:red;'>Result not found. Please check Roll No and Class.</p>";
        }
    }).catch(err => {
        document.getElementById('res').innerHTML = "<p style='color:red;'>Error loading data. Please try again.</p>";
    });
</script>
